<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Selection Dropdown - Fixed</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .dropdown-container {
            margin: 20px 0;
        }
        select {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .debug-info {
            margin-top: 20px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 4px;
            font-size: 14px;
        }
        .error {
            color: red;
            background: #ffe6e6;
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>✅ Fixed Job Selection Dropdown</h1>

    <div class="dropdown-container">
        <label for="job-select">Select a Job:</label>
        <select id="job-select">
            <option value="">Choose a job</option>
            <!-- Options will be populated by JavaScript -->
        </select>
    </div>

    <div class="debug-info">
        <h3>Debug Information:</h3>
        <div id="debug-output"></div>
    </div>

    <script>
        // ✅ FIX 4: Prevent crash with safe array check
        let jobs = []; // This could be undefined, null, or not an array
        const safeJobs = Array.isArray(jobs) ? jobs : [];

        // Simulate API response (replace with actual fetch)
        async function fetchJobs() {
            try {
                // Simulate API call
                const response = await fetch('/api/jobs'); // Your backend endpoint
                const data = await response.json();

                // ✅ FIX 4: Ensure jobs is always an array
                jobs = Array.isArray(data) ? data : (data.jobs ? data.jobs : []);

                console.log('Jobs fetched:', jobs);
                updateDropdown();
                updateDebugInfo();

            } catch (error) {
                console.error('Error fetching jobs:', error);
                document.getElementById('debug-output').innerHTML = `
                    <div class="error">❌ Error loading jobs: ${error.message}</div>
                `;
                jobs = []; // ✅ Prevent crash
                updateDropdown();
            }
        }

        // ✅ FIX 3: Correct dropdown rendering
        function updateDropdown() {
            const select = document.getElementById('job-select');

            // Clear existing options except the first one
            while (select.options.length > 1) {
                select.remove(1);
            }

            // ✅ FIX 4: Use safeJobs to prevent crashes
            safeJobs.forEach(job => {
                const option = document.createElement('option');
                option.value = job._id; // ✅ FIX 3: Use job._id as value
                option.textContent = job.title; // ✅ FIX 3: Display job.title
                select.appendChild(option);
            });
        }

        function updateDebugInfo() {
            const debugOutput = document.getElementById('debug-output');
            debugOutput.innerHTML = `
                <p>✅ Jobs loaded: ${safeJobs.length}</p>
                <p>✅ Jobs is array: ${Array.isArray(jobs)}</p>
                <p>✅ Safe jobs length: ${safeJobs.length}</p>
                <p>📋 Sample job data: ${safeJobs.length > 0 ? JSON.stringify(safeJobs[0], null, 2) : 'No jobs'}</p>
            `;
        }

        // Handle selection change
        document.getElementById('job-select').addEventListener('change', function(e) {
            const selectedId = e.target.value;
            const selectedJob = safeJobs.find(job => job._id === selectedId);

            console.log('Selected job:', selectedJob);

            const debugOutput = document.getElementById('debug-output');
            debugOutput.innerHTML += `
                <p>🎯 Selected job ID: ${selectedId}</p>
                <p>🎯 Selected job title: ${selectedJob ? selectedJob.title : 'None'}</p>
            `;
        });

        // Initialize
        updateDebugInfo();

        // Uncomment to test with mock data
        // jobs = [
        //     { _id: '1', title: 'Software Engineer' },
        //     { _id: '2', title: 'Product Manager' },
        //     { _id: '3', title: 'Designer' }
        // ];
        // updateDropdown();
        // updateDebugInfo();

        // Fetch jobs on page load
        // fetchJobs();
    </script>
</body>
</html>
