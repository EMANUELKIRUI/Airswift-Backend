<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form - Fixed</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .content {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #667eea;
            outline: none;
        }

        .file-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .file-group {
            margin-bottom: 15px;
        }

        input[type="file"] {
            margin-bottom: 8px;
        }

        .file-selected {
            color: #28a745;
            font-weight: 500;
        }

        .error {
            color: #dc3545;
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .success {
            color: #155724;
            background: #d4edda;
            border: 1px solid #c3e6cb;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
        }

        .submit-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
            transform: none;
        }

        .debug-section {
            margin-top: 30px;
            padding: 15px;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 6px;
        }

        .debug-section pre {
            background: white;
            padding: 10px;
            border-radius: 4px;
            font-size: 12px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 Job Application Form</h1>
            <p>Fixed version with correct field names</p>
        </div>

        <div class="content">
            <div id="error-message" class="error" style="display: none;"></div>
            <div id="success-message" class="success" style="display: none;"></div>

            <form id="application-form">
                <div class="form-group">
                    <label for="job-title">Job Title *</label>
                    <input type="text" id="job-title" name="jobTitle" placeholder="Type the job title you want" required list="job-options" />
                    <datalist id="job-options"></datalist>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number *</label>
                    <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000" required>
                </div>

                <div class="form-group">
                    <label for="national-id">National ID *</label>
                    <input type="text" id="national-id" name="nationalId" placeholder="Your national ID number" required>
                </div>

                <div class="file-section">
                    <h3>📄 Required Documents (PDF only, max 5MB each)</h3>

                    <div class="file-group">
                        <label for="cv-upload">CV / Resume *</label>
                        <input type="file" id="cv-upload" accept=".pdf,application/pdf" required>
                        <div id="cv-selected" class="file-selected"></div>
                    </div>

                    <div class="file-group">
                        <label for="national-id-upload">National ID Document *</label>
                        <input type="file" id="national-id-upload" accept=".pdf,application/pdf" required>
                        <div id="national-id-selected" class="file-selected"></div>
                    </div>

                    <div class="file-group">
                        <label for="passport-upload">Passport *</label>
                        <input type="file" id="passport-upload" accept=".pdf,application/pdf" required>
                        <div id="passport-selected" class="file-selected"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="cover-letter">Cover Letter (optional)</label>
                    <textarea id="cover-letter" name="coverLetter" rows="4" placeholder="Tell us why you're interested in this position..."></textarea>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">📤 Submit Application</button>
            </form>

            <div class="debug-section">
                <h4>🔍 Debug Information</h4>
                <pre id="debug-info"></pre>
            </div>
        </div>
    </div>

    <script>
        // Form state
        let formData = {

            jobTitle: '',
            phone: '',
            nationalId: '',
            coverLetter: ''
        };

        let files = {
            cv: null,
            nationalId: null,
            passport: null
        };

        let isLoading = false;

        // DOM elements
        const form = document.getElementById('application-form');
        const errorDiv = document.getElementById('error-message');
        const successDiv = document.getElementById('success-message');
        const submitBtn = document.getElementById('submit-btn');
        const debugInfo = document.getElementById('debug-info');

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadJobs();
            setupFileHandlers();
            updateDebugInfo();
        });

        // Load available jobs
        async function loadJobs() {
            try {
                console.log('📥 Fetching available jobs...');
                const response = await fetch('/api/applications/job-options');
                const body = await response.json();
                const jobs = body?.data?.jobs || body?.jobs || body || [];

                const dataList = document.getElementById('job-options');
                dataList.innerHTML = '';

                if (Array.isArray(jobs)) {
                    jobs.forEach(job => {
                        const option = document.createElement('option');
                        option.value = job.title || job.name || '';
                        dataList.appendChild(option);
                    });
                    console.log(`✅ Jobs loaded: ${jobs.length}`);
                }
            } catch (error) {
                console.error('❌ Error fetching jobs:', error);
            }
        }

        // Setup file input handlers
        function setupFileHandlers() {
            document.getElementById('cv-upload').addEventListener('change', (e) => handleFileChange(e, 'cv'));
            document.getElementById('national-id-upload').addEventListener('change', (e) => handleFileChange(e, 'nationalId'));
            document.getElementById('passport-upload').addEventListener('change', (e) => handleFileChange(e, 'passport'));
        }

        // Handle file selection
        function handleFileChange(event, fieldName) {
            const file = event.target.files?.[0];

            if (!file) {
                files[fieldName] = null;
                updateFileDisplay(fieldName);
                return;
            }

            // Validate file type
            if (file.type !== 'application/pdf') {
                showError(`❌ ${fieldName} must be a PDF file. You selected: ${file.type}`);
                event.target.value = '';
                files[fieldName] = null;
                updateFileDisplay(fieldName);
                return;
            }

            // Validate file size (5MB max)
            const maxSize = 5 * 1024 * 1024;
            if (file.size > maxSize) {
                showError(`❌ ${fieldName} is too large (${(file.size / 1024 / 1024).toFixed(2)}MB). Maximum size is 5MB.`);
                event.target.value = '';
                files[fieldName] = null;
                updateFileDisplay(fieldName);
                return;
            }

            files[fieldName] = file;
            console.log(`✅ File selected: ${fieldName} - ${file.name} (${(file.size / 1024).toFixed(2)}KB)`);
            updateFileDisplay(fieldName);
            updateDebugInfo();
            hideError();
        }

        // Update file display
        function updateFileDisplay(fieldName) {
            const displayElement = document.getElementById(`${fieldName === 'nationalId' ? 'national-id' : fieldName}-selected`);
            if (files[fieldName]) {
                displayElement.textContent = `✅ ${files[fieldName].name} (${(files[fieldName].size / 1024).toFixed(2)}KB)`;
            } else {
                displayElement.textContent = '';
            }
        }

        // Form input handlers
        document.getElementById('job-title').addEventListener('input', (e) => {
            formData.jobTitle = e.target.value;
            updateDebugInfo();
        });

        document.getElementById('phone').addEventListener('input', (e) => {
            formData.phone = e.target.value;
            updateDebugInfo();
        });

        document.getElementById('national-id').addEventListener('input', (e) => {
            formData.nationalId = e.target.value;
            updateDebugInfo();
        });

        document.getElementById('cover-letter').addEventListener('input', (e) => {
            formData.coverLetter = e.target.value;
            updateDebugInfo();
        });

        // Form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!validateForm()) {
                return;
            }

            await submitApplication();
        });

        // Validate form
        function validateForm() {
            console.log('🔍 Validating form...');

            // Check required fields
            if (!formData.phone?.trim()) {
                showError('❌ Phone number is required');
                return false;
            }

            if (!formData.nationalId?.trim()) {
                showError('❌ National ID is required');
                return false;
            }

            if (!formData.jobTitle?.trim()) {
                showError('❌ Please enter a job title');
                return false;
            }

            // Check files
            if (!files.cv) {
                showError('❌ CV file is required');
                return false;
            }

            if (!files.nationalId) {
                showError('❌ National ID file is required');
                return false;
            }

            if (!files.passport) {
                showError('❌ Passport file is required');
                return false;
            }

            console.log('✅ Form validation passed');
            return true;
        }

        // Submit application
        async function submitApplication() {
            try {
                hideError();
                hideSuccess();
                setLoading(true);

                console.log('📤 Preparing form submission...');

                // Create FormData
                const formDataToSend = new FormData();

                // Append form fields
                formDataToSend.append('jobTitle', formData.jobTitle);
                formDataToSend.append('nationalId', formData.nationalId);
                formDataToSend.append('phone', formData.phone);

                // Append files with correct field names
                formDataToSend.append('cv', files.cv);
                formDataToSend.append('passport', files.passport);

                console.log('📋 Form data prepared:');
                console.log('   - CV:', files.cv?.name);
                console.log('   - Passport:', files.passport?.name);
                console.log('   - Job:', formData.jobTitle);
                console.log('   - Phone:', formData.phone);

                // Send request
                console.log('📤 Sending application...');
                const token = localStorage.getItem("token");
                const response = await fetch('/api/applications', {
                    method: 'POST',
                    headers: {
                        Authorization: `Bearer ${token}`,
                    },
                    body: formDataToSend,
                });

                if (!response.ok) {
                    let errorMessage = `HTTP ${response.status}`;
                    const responseText = await response.text();
                    try {
                        const errorData = JSON.parse(responseText);
                        errorMessage = errorData.message || errorData.error || errorMessage;
                    } catch (jsonErr) {
                        console.error('Server returned non-JSON error response:', responseText);
                        errorMessage = responseText || errorMessage;
                    }
                    throw new Error(errorMessage);
                }

                let data;
                try {
                    data = await response.json();
                } catch (parseErr) {
                    const html = await response.text();
                    console.error('Server returned HTML:', html);
                    throw new Error('Server error');
                }
                console.log('✅ Application submitted successfully:', data);

                showSuccess('✅ Application submitted successfully!');
                resetForm();

            } catch (error) {
                console.error('❌ Application submission error:', error);
                showError(`❌ ${error.message}`);
            } finally {
                setLoading(false);
            }
        }

        // Reset form
        function resetForm() {
            formData = {
                jobTitle: '',
                phone: '',
                nationalId: '',
                coverLetter: ''
            };

            files = {
                cv: null,
                nationalId: null,
                passport: null
            };

            form.reset();
            ['cv', 'national-id', 'passport'].forEach(field => {
                document.getElementById(`${field}-selected`).textContent = '';
            });

            updateDebugInfo();
        }

        // UI helpers
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            successDiv.style.display = 'none';
        }

        function hideError() {
            errorDiv.style.display = 'none';
        }

        function showSuccess(message) {
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            errorDiv.style.display = 'none';
        }

        function hideSuccess() {
            successDiv.style.display = 'none';
        }

        function setLoading(loading) {
            isLoading = loading;
            submitBtn.disabled = loading;
            submitBtn.textContent = loading ? '⏳ Submitting...' : '📤 Submit Application';
        }

        function updateDebugInfo() {
            debugInfo.textContent = JSON.stringify({
                jobTitle: formData.jobTitle,
                phone: formData.phone,
                nationalId: formData.nationalId,
                files: {
                    cv: files.cv?.name || 'Not selected',
                    nationalId: files.nationalId?.name || 'Not selected',
                    passport: files.passport?.name || 'Not selected'
                },
                isLoading
            }, null, 2);
        }
    </script>
</body>
</html></content>
